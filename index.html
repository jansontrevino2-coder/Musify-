<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Musify+</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#000000" />

  <link rel="stylesheet" href="/style.css" />

  <script>
    // iOS audio unlock
    document.addEventListener(
      "touchstart",
      () => {
        const a = new Audio();
        a.muted = true;
        a.play().catch(() => {});
      },
      { once: true }
    );
  </script>
</head>
<body>
  <div id="app">
    <h1>Musify+</h1>

    <div id="dropzone" class="glass">Drop ZIP here to import your music</div>

    <h2>Your Library</h2>
    <ul id="trackList" class="glass"></ul>

    <h2>Now Playing</h2>
    <audio id="player" controls class="glass"></audio>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/idb@7.1.1/build/iife/index-min.js"></script>

  <script src="/app.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js");
      });
    }
  </script>
</body>
</html>
